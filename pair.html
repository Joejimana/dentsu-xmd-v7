<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MINI-NATSU-MD | Pair Device</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;400;500;600&display=swap');
    :root {
      --primary: #8a2be2;
      --secondary: #00f7ff;
      --accent: #ff2a6d;
      --dark: #0c1020;
      --darker: #080c18;
      --glass: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      display:flex; justify-content:center; align-items:center;
      min-height:100vh;
      background:linear-gradient(135deg,var(--darker) 0%,var(--dark) 100%);
      font-family:'Rajdhani',sans-serif; color:white; overflow:hidden; position:relative;
    }
    body::before {
      content:''; position:absolute; top:0; left:0; width:100%; height:100%;
      background:radial-gradient(circle at 20% 30%,rgba(138,43,226,.15) 0%,transparent 50%),
                 radial-gradient(circle at 80% 70%,rgba(0,247,255,.1) 0%,transparent 50%);
      z-index:-2;
    }
    .grid {
      position:absolute; top:0; left:0; width:100%; height:100%;
      background-image:linear-gradient(rgba(0,247,255,.05) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(0,247,255,.05) 1px,transparent 1px);
      background-size:30px 30px; z-index:-1;
    }
    .container { display:flex; flex-direction:column; align-items:center; width:100%; padding:20px; }
    .main { position:relative; width:100%; max-width:400px; }
    .box {
      width:100%; padding:35px 30px; position:relative; text-align:center;
      background:var(--glass); border-radius:16px; backdrop-filter:blur(12px);
      border:1px solid var(--glass-border);
      box-shadow:0 10px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);
    }
    .logo-text {
      font-family:'Orbitron',sans-serif; font-size:26px; font-weight:700;
      background:linear-gradient(45deg,var(--primary),var(--secondary));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      letter-spacing:2px; margin-bottom:8px;
    }
    .subtitle { color:rgba(255,255,255,.6); font-size:14px; margin-bottom:28px; }
    h3 { font-family:'Orbitron',sans-serif; font-size:15px; color:var(--secondary); margin-bottom:6px; }
    h6 { font-size:13px; color:rgba(255,255,255,.6); margin-bottom:20px; }
    .input-container {
      display:flex; background:rgba(0,0,0,.2); border-radius:12px; padding:4px;
      gap:4px; width:100%; margin-bottom:20px; border:1px solid var(--glass-border);
    }
    .input-container input {
      border-radius:8px 0 0 8px; background:rgba(0,0,0,.3); width:100%; flex-basis:75%;
      padding:14px; border:none; border-right:1px solid rgba(138,43,226,.3);
      color:white; font-family:'Rajdhani',sans-serif; font-size:15px;
    }
    .input-container input:focus { outline:none; }
    .input-container input::placeholder { color:rgba(255,255,255,.4); }
    .input-container button {
      flex-basis:25%; padding:14px;
      background:linear-gradient(135deg,var(--primary) 0%,#6a11cb 100%);
      font-family:'Orbitron',sans-serif; font-size:11px; font-weight:600;
      text-transform:uppercase; color:white; border:none; border-radius:0 8px 8px 0;
      cursor:pointer; transition:all .3s;
    }
    .input-container button:hover { background:linear-gradient(135deg,var(--accent) 0%,#ff2a6d 100%); }
    #waiting-message { display:none; color:var(--secondary); font-family:'Orbitron',sans-serif; margin:12px 0; font-size:13px; }
    #pair { min-height:60px; display:flex; align-items:center; justify-content:center; margin-top:10px; }
    .code-display {
      font-family:'Orbitron',sans-serif; font-size:20px;
      background:rgba(0,0,0,.3); padding:14px 22px; border-radius:8px;
      border:1px solid var(--glass-border); cursor:pointer; transition:all .3s;
      display:flex; align-items:center; gap:10px;
    }
    .code-display:hover { box-shadow:0 0 15px rgba(138,43,226,.3); transform:translateY(-2px); }
    .code-value { color:var(--secondary); font-weight:700; }
    .pulse { animation:pulse 2s infinite; }
    @keyframes pulse {
      0%{box-shadow:0 0 0 0 rgba(0,247,255,.4)}
      70%{box-shadow:0 0 0 10px rgba(0,247,255,0)}
      100%{box-shadow:0 0 0 0 rgba(0,247,255,0)}
    }
    .info-note {
      margin-top:20px; padding:12px 16px; background:rgba(0,247,255,.06);
      border:1px solid rgba(0,247,255,.2); border-radius:8px;
      font-size:12px; color:rgba(255,255,255,.65); line-height:1.6;
    }
    @media(max-width:480px){
      .input-container{flex-direction:column;}
      .input-container input{border-radius:8px;border-right:none;border-bottom:1px solid rgba(138,43,226,.3);}
      .input-container button{border-radius:8px;padding:12px;}
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="container">
    <div class="main">
      <div class="box">
        <div class="logo-text">MINI-NATSU-MD</div>
        <p class="subtitle">Pair your WhatsApp device</p>
        <h3>∞ Link with phone number ∞</h3>
        <h6>📡 Enter your number with country code 📡</h6>
        <div class="input-container">
          <input placeholder="+50900000000" type="tel" id="number">
          <button id="submit">Pair</button>
        </div>
        <a id="waiting-message">⏳ Generating code...</a>
        <main id="pair"></main>
        <div class="info-note">
          After getting the code, open WhatsApp → Settings → Linked Devices → Link a Device → Link with phone number, then enter the code.
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    const a = document.getElementById('pair');
    const b = document.getElementById('submit');
    const c = document.getElementById('number');
    const waitingMsg = document.getElementById('waiting-message');

    async function Copy() {
      const val = document.getElementById('copy-value').innerText;
      const display = document.getElementById('code-display');
      await navigator.clipboard.writeText(val);
      display.innerHTML = '<i class="fas fa-check" style="color:#00ff00"></i>&nbsp; COPIED!';
      setTimeout(() => {
        display.innerHTML = `<i class="fas fa-copy" style="color:var(--secondary)"></i>&nbsp;<span>CODE:</span>&nbsp;<span class="code-value" id="copy-value">${val}</span>`;
      }, 2000);
    }

    b.addEventListener('click', async (e) => {
      e.preventDefault();
      const raw = c.value.replace(/[^0-9]/g, '');
      if (!raw) {
        a.innerHTML = '<div style="color:var(--accent);padding:10px;border-radius:8px;border:1px solid rgba(255,42,109,.3);background:rgba(255,42,109,.1)"><i class="fas fa-exclamation-circle"></i> Enter your WhatsApp number with country code.</div>';
        return;
      }
      if (raw.length < 10) {
        a.innerHTML = '<div style="color:var(--accent);padding:10px;border-radius:8px;border:1px solid rgba(255,42,109,.3);background:rgba(255,42,109,.1)"><i class="fas fa-times"></i> Number too short.</div>';
        return;
      }
      c.value = '+' + raw;
      waitingMsg.style.display = 'block';
      a.innerHTML = '';
      try {
        const { data } = await axios(`/code?number=${raw}`);
        const code = data.code || 'Unavailable';
        waitingMsg.style.display = 'none';
        a.innerHTML = `
          <div class="code-display pulse" id="code-display" onclick="Copy()">
            <i class="fas fa-copy" style="color:var(--secondary)"></i>
            <span>CODE:</span>
            <span class="code-value" id="copy-value">${code}</span>
          </div>`;
      } catch {
        waitingMsg.style.display = 'none';
        a.innerHTML = '<div style="color:var(--accent);padding:10px;border-radius:8px;border:1px solid rgba(255,42,109,.3);background:rgba(255,42,109,.1)"><i class="fas fa-exclamation-triangle"></i> Service unavailable. Try again.</div>';
      }
    });
  </script>
</body>
</html>
